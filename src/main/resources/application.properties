# ================================================
# FarmMart - application.properties
# This file REPLACES your .env file
# ================================================

# Server Port (replaces: const PORT = 8080)
server.port=${PORT:8080}

# MongoDB Connection (replaces: MONGODB_URI in .env)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/farmmart}

# JWT Configuration (replaces: SECRET_KEY_ACCESS_TOKEN)
# IMPORTANT: jwt.secret must be at least 32 characters long
jwt.secret=${JWT_SECRET:your-super-secret-key-minimum-32-chars-long}
jwt.expiration-ms=18000000

# Cloudinary (replaces: CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your-cloud-name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your-api-key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your-api-secret}

# Resend Email API (replaces: RESEND_API in .env)
resend.api-key=${RESEND_API:your-resend-api-key}

# Frontend URL for CORS (replaces: FRONTEND_URL in .env)
frontend.url=${FRONTEND_URL:http://localhost:5173}

# File Upload Size Limit (replaces: multer limits)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Logging
logging.level.com.farmmart=DEBUG
logging.level.org.springframework.security=DEBUG
